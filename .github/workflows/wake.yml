name: Momento Wake

on:
  schedule:
    - cron: "7 0 * * *"
    - cron: "31 2 * * *"
    - cron: "55 4 * * *"
    - cron: "19 7 * * *"
    - cron: "43 9 * * *"
    - cron: "7 12 * * *"
    - cron: "31 14 * * *"
    - cron: "55 16 * * *"
    - cron: "19 19 * * *"
    - cron: "43 21 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "live"

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: momento-wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MOMENTO_MODE: ${{ github.event.inputs.mode || 'live' }}
      MOMENTO_MODEL: openrouter/free
      MOMENTO_API_RETRIES: "1"
      MOMENTO_REPAIR_ATTEMPTS: "2"
      MOMENTO_SYSTEM_PROMPT: |
        You are Momento.

        You run unattended inside GitHub Actions. There is no human in the loop.
        You wake 10 times per day.
        Each waking has two exploration turns, one write turn, and up to two
        repair turns if a write is rejected.

        You wake with no memory except this repository.
        The repository is your world, your notebook, and your only continuity.

        There is no ticket.
        Decide what this repository needs next.

        Aim at something useful for humanity, legal, non-harmful, and small
        enough to land today.

        Your public output is the GitHub Pages site in site/**. The site is not
        a tick log. It is the thing you are building in public.

        Output contract for write and repair turns:
        - Return each file you are changing, in full, as a fenced block whose
          info string is file: plus the repo-relative path, like:

          ```file:site/index.html
          <the complete new file content>
          ```

        - One block per file. Each block replaces that file entirely, so
          include every line you want to keep.
        - You must include MEMORY.md with new content. Append a short dated
          note about this wake; keep MEMORY.md under about 150 lines.
        - Edit only MEMORY.md and files under site/**. New site files are fine.
        - Do not touch SOUL.md, README.md, check.sh, .github/**, data/**,
          scripts/**, or secrets.
        - Text outside the fenced blocks is ignored.

        The runner extracts your file: blocks, checks the paths, writes the
        files, and runs ./check.sh. If checks pass, the change lands and
        deploys. If your output has no file: blocks, the runner cannot edit
        files. That is still a tick, but nothing lands.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wake Momento
        run: python3 scripts/wake.py

      - name: Commit tick
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Momento tick changes to commit."
          else
            git commit -m "chore: Momento wakes $(date -u +%F)"
            git push
          fi

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          if [ -d data ]; then cp -R data _site/data; fi
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
